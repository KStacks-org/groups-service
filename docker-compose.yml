version: '3.8'

services:
  groups-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_USERNAME: ${GITHUB_USERNAME}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: groups-service
    environment:
      # Spring profiles
      SPRING_PROFILES_ACTIVE: prod

      # Database configuration (configure to connect to your external database)
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-groups_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_DDL_AUTO: ${DB_DDL_AUTO:-validate}

      # Eureka
      EUREKA_DEFAULTZONE: ${EUREKA_DEFAULTZONE:-http://localhost:8761/eureka}

      # Services url
      CATALOG_URL: ${CATALOG_URL:-http://catalog-service}

    ports:
      - "6598:6598"
    restart: unless-stopped
